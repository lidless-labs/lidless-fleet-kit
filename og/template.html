<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap");
  * { margin: 0; box-sizing: border-box; }
  /* 1200x630 logical; renderer captures at deviceScaleFactor 2 => 2400x1260. */
  html, body { width: 1200px; height: 630px; }
  body {
    /* Lidless dark-watch ground: terminal-dark, a single faint accent-blue glow,
       and a hairline console grid so it reads "watch console", not "marketing page". */
    background:
      radial-gradient(ellipse 70% 60% at 78% 22%, color-mix(in srgb, #38bdf8 12%, transparent), transparent 60%),
      radial-gradient(ellipse 80% 50% at 50% -10%, color-mix(in srgb, #38bdf8 5%, transparent), transparent 60%),
      linear-gradient(#11151b 1px, transparent 1px),
      linear-gradient(90deg, #11151b 1px, transparent 1px),
      #0a0e15;
    background-size: auto, auto, 44px 44px, 44px 44px;
    color: #d7dde3;
    font-family: "Inter", system-ui, sans-serif;
    position: relative;
    overflow: hidden;
  }
  .pad { padding: 64px 70px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; position: relative; z-index: 2; }
  .kicker {
    font-family: "IBM Plex Mono", monospace;
    font-size: 18px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: #38bdf8;
  }
  .brand { display: flex; align-items: center; gap: 22px; margin-top: 30px; }
  .eye { width: 92px; height: 92px; flex: 0 0 auto; filter: drop-shadow(0 0 22px color-mix(in srgb, #38bdf8 45%, transparent)); }
  .wordmark {
    font-weight: 800; letter-spacing: 0.04em; font-size: 92px; line-height: 1;
    color: #eef2f6;
  }
  .motto { margin-top: 20px; font-size: 52px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.02; }
  .motto .accent { color: #38bdf8; }
  .sub { margin-top: 20px; font-size: 23px; line-height: 1.45; color: #8b95a1; max-width: 720px; }
  .foot {
    font-family: "IBM Plex Mono", monospace; font-size: 16px; letter-spacing: 0.05em;
    color: #5e6873; display: flex; gap: 34px; align-items: center;
  }
  .foot b { color: #d7dde3; font-weight: 600; }
  .foot .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 10px #22c55e; display: inline-block; margin-right: 9px; vertical-align: middle; }
  /* The watch panel on the right: a quiet SOC console reading the live status. */
  .panel {
    position: absolute; top: 86px; right: 64px; width: 320px; z-index: 2;
    background: color-mix(in srgb, #101216 92%, transparent);
    border: 1px solid #262c34; border-radius: 10px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 0 1px color-mix(in srgb, #38bdf8 10%, transparent);
    font-family: "IBM Plex Mono", monospace; overflow: hidden;
  }
  .panel-bar { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid #1a1e24; background: #0d0f13; }
  .panel-bar .led { width: 9px; height: 9px; border-radius: 50%; }
  .led.r { background: #ef4444; } .led.y { background: #f59e0b; } .led.g { background: #22c55e; }
  .panel-bar .title { margin-left: 8px; font-size: 12px; letter-spacing: 0.16em; color: #8b95a1; text-transform: uppercase; }
  .panel-body { padding: 16px 18px; }
  .prow { display: flex; justify-content: space-between; font-size: 14px; padding: 6px 0; gap: 12px; }
  .prow .k { color: #5e6873; }
  .prow .v { color: #d7dde3; text-align: right; }
  .prow .v.ok { color: #22c55e; }
  .panel-foot { padding: 12px 18px; border-top: 1px solid #1a1e24; font-size: 11px; letter-spacing: 0.14em; color: #5e6873; text-align: center; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="panel" id="panel"></div>
  <div class="pad">
    <div class="kicker" id="kicker"></div>
    <div>
      <div class="brand">
        <svg class="eye" viewBox="0 0 64 64" aria-hidden="true">
          <path d="M6 32 C18 16, 46 16, 58 32 C46 48, 18 48, 6 32 Z" fill="none" stroke="#38bdf8" stroke-width="2.4" stroke-linejoin="round"/>
          <circle cx="32" cy="32" r="10.5" fill="none" stroke="#38bdf8" stroke-width="2.4"/>
          <circle cx="32" cy="32" r="3.8" fill="#38bdf8"/>
          <circle cx="35.8" cy="28.3" r="1.5" fill="#0a0e15"/>
        </svg>
        <span class="wordmark" id="wordmark">LIDLESS</span>
      </div>
      <div class="motto" id="motto"></div>
      <div class="sub" id="sub"></div>
    </div>
    <div class="foot" id="foot"></div>
  </div>
  <script>
    // Called by the renderer via page.evaluate, so the same template drives
    // every card with no web server in the loop (cron-safe).
    window.renderOG = function (data) {
      document.getElementById('kicker').textContent = '[ ' + data.kicker + ' ]';
      document.getElementById('wordmark').textContent = data.wordmark || 'LIDLESS';
      document.getElementById('motto').innerHTML = data.motto;
      document.getElementById('sub').textContent = data.sub;
      document.getElementById('foot').innerHTML = data.foot.map(function (f) {
        if (f.live) return '<span><span class="dot"></span>' + f.t + '</span>';
        return f.b ? '<span><b>' + f.b + '</b> ' + f.t + '</span>' : '<span>' + f.t + '</span>';
      }).join('');
      var p = data.panel;
      var html = '<div class="panel-bar"><span class="led r"></span><span class="led y"></span><span class="led g"></span><span class="title">' + p.title + '</span></div>';
      html += '<div class="panel-body">';
      html += p.rows.map(function (r) {
        return '<div class="prow"><span class="k">' + r.k + '</span><span class="v ' + (r.ok ? 'ok' : '') + '">' + r.v + '</span></div>';
      }).join('');
      html += '</div>';
      if (p.foot) html += '<div class="panel-foot">' + p.foot + '</div>';
      document.getElementById('panel').innerHTML = html;
    };
  </script>
</body>
</html>
