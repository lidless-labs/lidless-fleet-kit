      <circle cx="628" cy="224" r="4" fill="#38bdf8"/>
      <text x="814" y="276" text-anchor="end" class="status" fill="#38bdf8">focus</text>
      <text x="644" y="229" class="node-title">
        <tspan x="644" dy="0">lidless.dev</tspan>
      </text>
      <text x="628" y="264" class="node-meta">
        <tspan x="628" dy="0">one hub, one catalog</tspan>
