      <circle cx="900" cy="354" r="4" fill="#7c8894"/>

      <text x="916" y="359" class="node-title">
        <tspan x="916" dy="0">push if changed</tspan>
      </text>
      <text x="900" y="394" class="node-meta">
        <tspan x="900" dy="0">no-op run touches nothing</tspan>
